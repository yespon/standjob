services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    # Optional: mount external scoring criteria and teaching material
    # When not mounted, the embedded backend/references/ files are used
    # volumes:
    #   - ./data/scoring.xlsx:/data/scoring.xlsx:ro
    #   - ./data/teaching.pdf:/data/teaching.pdf:ro
    environment:
      - UPLOAD_DIR=/tmp/standjob_uploads
    volumes:
      - uploads:/tmp/standjob_uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  uploads:
