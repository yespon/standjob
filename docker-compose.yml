services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      - SCORING_CRITERIA_PATH=/data/scoring.xlsx
      - TEACHING_MATERIAL_PATH=/data/teaching.pdf
    volumes:
      - ./data/scoring.xlsx:/data/scoring.xlsx:ro
      - ./data/teaching.pdf:/data/teaching.pdf:ro
      - uploads:/tmp/standjob_uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  uploads:
